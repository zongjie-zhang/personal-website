<!DOCTYPE html>
<html>
<head>
    <title>Zongjie Zhang</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
            color: #111;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            min-height: 100vh;
            box-sizing: border-box;
            padding: 42px;
            display: flex;
            flex-direction: column;
        }

        .name {
            font-size: 28px;
            font-weight: normal;
            margin: 0;
        }

        .main-links {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 42px;
            align-items: center;
        }

        .main-button {
            min-height: 260px;
            border: 1px solid #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-sizing: border-box;
        }

        .main-button:hover {
            cursor: pointer;
        }

        @media (max-width: 760px) {
            .page {
                padding: 28px;
            }

            .main-links {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .main-button {
                min-height: 180px;
                font-size: 30px;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <h1 class="name">Zongjie Zhang</h1>

        <div class="main-links">
            <a class="main-button" href="{{ url_for('projects') }}">Project</a>
            <a class="main-button" href="{{ url_for('games') }}">Game</a>
        </div>
    </main>
</body>
</html>
