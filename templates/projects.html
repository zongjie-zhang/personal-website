<!DOCTYPE html>
<html>
<head>
    <title>Project</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
            color: #111;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        a:hover {
            cursor: pointer;
        }

        .page {
            min-height: 100vh;
            box-sizing: border-box;
            padding: 42px;
        }

        .top-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 22px;
            width: min(760px, 100%);
        }

        .project-link {
            min-height: 140px;
            border: 1px solid #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            text-align: center;
            padding: 18px;
            box-sizing: border-box;
        }

        .project-link:hover {
            background-color: #111;
            color: white;
        }
    </style>
</head>

<body>
    <main class="page">
        <div class="top-row">
            <a class="project-link" href="{{ chopin_site_root }}">Chopin</a>
            <a class="project-link" href="{{ url_for('singapore_tour') }}">Singapore Tour</a>
        </div>
    </main>
</body>
</html>
